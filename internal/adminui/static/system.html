<section class="hero">
  <div class="page-head">
    <div>
      <span class="meta-pill" data-i18n="page_system_tag"></span>
      <h2 data-i18n="nav_system"></h2>
      <p class="page-subtitle" data-i18n="system_subtitle"></p>
    </div>
  </div>
</section>
<style>
  .system-panel{
    min-height:356px;
  }
  .system-panel .surface,
  .system-panel .chart{
    margin-top:10px;
  }
  .system-panel .surface{
    background:rgba(255,255,255,.95);
  }
  .system-panel #sys th,
  .system-panel #sys td{
    padding-top:12px;
    padding-bottom:12px;
  }
</style>
<div class="split">
  <div class="card system-panel">
    <h3 class="section-title" data-i18n="sys_title"></h3>
    <p class="section-subtitle" data-i18n="section_table"></p>
    <div class="surface">
      <table id="sys" class="dense-table"></table>
    </div>
  </div>
  <div class="card system-panel">
    <h3 class="section-title" data-i18n="memory_trend_title"></h3>
    <p class="section-subtitle" data-i18n="section_trend"></p>
    <canvas id="memChart" class="chart"></canvas>
  </div>
</div>
<script>
const memHistory=[];
async function refresh(){
  const r=await fetch('/admin/api/system');
  if(!r.ok){location.href='/admin/login';return;}
  const d=await r.json();
  const rows=[
    [tr('label_uptime'),d.uptime_text],
    [tr('label_go_routines'),d.go_routines],
    [tr('label_cpu_cores'),d.cpu_cores],
    [tr('label_memory_alloc_mb'),Number(d.memory_alloc_mb).toFixed(2)],
    [tr('label_memory_heap_inuse_mb'),Number(d.memory_heap_inuse_mb).toFixed(2)],
    [tr('label_memory_sys_mb'),Number(d.memory_sys_mb).toFixed(2)],
    [tr('label_gc_count'),d.gc_count]
  ];
  document.getElementById('sys').innerHTML=rows.map(x=>'<tr><th>'+x[0]+'</th><td>'+x[1]+'</td></tr>').join('');
  memHistory.push(Number(d.memory_alloc_mb||0));
  if(memHistory.length>30)memHistory.shift();
  drawLine(document.getElementById('memChart'),memHistory,{stroke:'#8b7a4c',fill:'rgba(139,122,76,.12)',dot:'#8b7a4c'});
}
refresh();
setInterval(refresh,2000);
window.addEventListener('resize',()=>drawLine(document.getElementById('memChart'),memHistory,{stroke:'#8b7a4c',fill:'rgba(139,122,76,.12)',dot:'#8b7a4c'}));
</script>
