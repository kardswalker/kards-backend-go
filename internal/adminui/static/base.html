<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root{
      --bg:#e8eeed;
      --bg-accent:#dff2ef;
      --bg-mint:#e0f6f3;
      --ink:#1b3f44;
      --muted:#5a7d7d;
      --panel:#ffffff;
      --panel-strong:#fff;
      --line:#cfe1df;
      --nav:#23494c;
      --nav-soft:#2c5f5f;
      --primary:#4ea8a2;
      --primary-deep:#2c5f5f;
      --gold:#7fbfbf;
      --danger:#b84035;
      --shadow:0 18px 50px rgba(24,33,43,.10);
      --radius:12px;
      --mx:50%;
      --my:24%;
      --nav-shift:50%;
      --hero-shift:50%;
      --surface-opacity:.94;
    }
    @keyframes settleSweep{
      0%{opacity:.95;transform:translate3d(-3%,0,0) scale(1.03)}
      60%{opacity:.66;transform:translate3d(3%,0,0) scale(1.01)}
      100%{opacity:0;transform:translate3d(0,0,0) scale(1)}
    }
    @keyframes floatLift{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-3px)}
    }
    @keyframes revealRise{
      0%{opacity:0;transform:translateY(14px)}
      100%{opacity:1;transform:translateY(0)}
    }
    @keyframes navDrip{
      0%{opacity:0;clip-path:inset(0 0 100% 0 round 26px);transform:translateX(-18px) scale(.98)}
      55%{opacity:1;clip-path:inset(0 0 0 0 round 26px);transform:translateX(0) scale(1)}
      100%{opacity:1;clip-path:inset(0 0 0 0 round 26px);transform:translateX(0) scale(1)}
    }
    *{box-sizing:border-box}
    body{
      font-family:"Aptos","Trebuchet MS","Segoe UI",sans-serif;
      background:#e8eeed;
      color:var(--ink);
      margin:0;
      min-height:100vh;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,.84), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(224,246,243,.72), transparent 24%),
        radial-gradient(circle at 74% 78%, rgba(224,246,243,.52), transparent 26%);
      z-index:0;
    }
    nav{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:stretch;
      justify-content:flex-start;
      padding:18px 16px;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,.84), transparent 34%),
        linear-gradient(180deg, rgba(224,246,243,.98), rgba(214,240,236,.98));
      background-repeat:no-repeat;
      color:var(--primary-deep);
      position:fixed;
      top:16px;
      left:16px;
      bottom:16px;
      width:280px;
      z-index:30;
      box-shadow:0 16px 40px rgba(10,20,28,.24);
      backdrop-filter:blur(14px);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      transform:translateX(calc(-100% - 24px));
      opacity:0;
      pointer-events:none;
      transition:transform .26s ease, opacity .22s ease, background .22s ease-out;
    }
    body.nav-open nav{
      transform:translateX(0);
      opacity:1;
      pointer-events:auto;
      animation:navDrip .42s cubic-bezier(.2,.8,.2,1) 1 both;
    }
    .nav-left,.nav-right{
      display:flex;
      align-items:stretch;
      gap:10px;
      min-width:0;
      flex-direction:column;
    }
    .nav-menu{
      display:flex;
      align-items:stretch;
      gap:10px;
      min-width:0;
      flex-wrap:nowrap;
      flex-direction:column;
    }
    nav strong{
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
      color:#43706f;
      margin-right:6px;
    }
    nav a,nav button{
      color:var(--primary-deep);
      text-decoration:none;
      padding:9px 12px;
      border-radius:10px;
      border:1px solid transparent;
      background:transparent;
      cursor:pointer;
      transition:.18s ease;
      position:relative;
      overflow:hidden;
    }
    nav a,nav button,.nav-brand{
      display:inline-flex;
      align-items:center;
      gap:8px;
      justify-content:center;
    }
    .nav-brand{
      color:var(--primary-deep);
    }
    .nav-icon{
      width:14px;
      height:14px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
      flex:0 0 auto;
      opacity:.92;
    }
    nav a:hover,nav button:hover{
      background:rgba(255,255,255,.68);
      border-color:rgba(44,95,95,.12);
      transform:translateY(-1px);
    }
    nav a,nav button{
      width:100%;
      justify-content:flex-start;
    }
    nav a.active{
      background:#f7fdfc;
      border-color:rgba(44,95,95,.18);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.4), 0 10px 18px rgba(20,44,44,.08);
      padding-left:16px;
    }
    nav a.active::before{
      content:"";
      position:absolute;
      left:0;
      top:8px;
      bottom:8px;
      width:4px;
      border-radius:0 4px 4px 0;
      background:#2c5f5f;
    }
    .sp{flex:1}
    .nav-fab{
      position:fixed;
      left:18px;
      bottom:18px;
      z-index:40;
      width:58px;
      height:58px;
      border-radius:14px;
      border:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#2c5f5f;
      color:#fff;
      box-shadow:0 16px 30px rgba(44,95,95,.26);
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, opacity .22s ease;
    }
    .nav-fab:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 20px 34px rgba(44,95,95,.30);
    }
    .nav-fab svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .nav-fab-label{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }
    body.nav-opening .nav-fab{
      opacity:0;
      pointer-events:none;
    }
    body.nav-open .nav-fab{
      opacity:0;
      pointer-events:none;
    }
    body.nav-closing .nav-fab{
      opacity:1;
    }
    .wrap{padding:28px 20px 36px;max-width:1320px;margin:0 auto}
    .card{
      background:linear-gradient(180deg, rgba(224,246,243,.92), rgba(255,255,255,.96));
      border:1px solid rgba(44,95,95,.10);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,.62), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(224,246,243,.08));
      opacity:.9;
      pointer-events:none;
    }
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 14px;border-bottom:1px solid rgba(24,33,43,.08);text-align:left;font-size:14px;vertical-align:top}
    th{
      font-size:12px;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#687788;
      font-weight:700;
    }
    tbody tr:hover{background:rgba(224,246,243,.56)}
    .muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .kpi{
      font-size:34px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:-.03em;
      font-variant-numeric:tabular-nums lining-nums;
      font-feature-settings:"tnum" 1,"lnum" 1;
    }
    .chart{
      height:260px;
      width:100%;
      display:block;
    }
    .numeric{
      font-variant-numeric:tabular-nums lining-nums;
      font-feature-settings:"tnum" 1,"lnum" 1;
    }
    input,select,textarea{
      padding:10px 12px;
      border-radius:8px;
      border:1px solid rgba(24,33,43,.14);
      background:rgba(255,255,255,.92);
      color:var(--ink);
      min-height:42px;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    input:focus,select:focus,textarea:focus{
      outline:none;
      border-color:rgba(11,116,184,.5);
      box-shadow:0 0 0 4px rgba(11,116,184,.10);
    }
    .btn{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:#2c5f5f;
      color:#f4fbfb;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.01em;
      box-shadow:0 10px 24px rgba(44,95,95,.20);
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(44,95,95,.26)}
    .btn.warn{background:#a5574d;box-shadow:0 10px 24px rgba(184,64,53,.12)}
    .btn.subtle{
      background:#e0f6f3;
      color:var(--nav-soft);
      border:1px solid rgba(44,95,95,.12);
      box-shadow:0 8px 18px rgba(44,95,95,.10);
      animation:none;
    }
    .btn.subtle:hover{box-shadow:0 12px 22px rgba(44,95,95,.14)}
    .btn:disabled{
      opacity:.58;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
      animation:none;
    }
    .btn-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn-icon svg{
      width:14px;
      height:14px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
      flex:0 0 auto;
    }
    .page-head{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:end;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .page-head h2{
      margin:0 0 8px;
      font-size:34px;
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
    }
    .page-subtitle{margin:0;color:var(--muted);font-size:15px;max-width:780px;line-height:1.55}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .toolbar .btn{box-shadow:0 10px 24px rgba(44,95,95,.16)}
    .table-shell{overflow-x:auto;border:1px solid rgba(44,95,95,.10);border-radius:10px;background:rgba(255,255,255,.92);box-shadow:var(--shadow);position:relative}
    .table-shell table{min-width:1000px}
    .table-shell thead th{
      position:sticky;
      top:0;
      background:#d7eeeb;
      z-index:1;
      white-space:nowrap;
      color:#315b5f;
      border-bottom:1px solid rgba(44,95,95,.14);
      box-shadow:inset 0 -1px 0 rgba(44,95,95,.08);
    }
    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border-radius:10px;
      background:#e0f6f3;
      color:#2c5f5f;
      font-size:12px;
      font-weight:700;
      border:1px solid rgba(127,191,191,.26);
    }
    .hero{
      padding:22px 22px 20px;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,.52), transparent 34%),
        linear-gradient(180deg, #e0f6f3, #dff3f0);
      color:#1b3f44;
      border-radius:14px;
      margin-bottom:18px;
      box-shadow:0 24px 50px rgba(19,35,47,.24);
      border:1px solid rgba(255,255,255,.10);
      transition:transform .22s ease-out, background .22s ease-out;
      animation:revealRise .55s ease-out 1 both;
      position:relative;
      overflow:hidden;
    }
    .hero::after{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:5px;
      background:#2c5f5f;
      pointer-events:none;
    }
    .hero .page-subtitle{color:#436b6a}
    .hero .meta-pill{background:#ffffff;color:#2c5f5f;border-color:rgba(44,95,95,.10)}
    .section-title{margin:0 0 4px;font-size:20px;letter-spacing:-.02em}
    .section-subtitle{margin:0;color:var(--muted);font-size:13px}
    .stat-card{
      position:relative;
      overflow:hidden;
      min-height:150px;
      animation:floatLift 8s ease-in-out infinite;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .stat-card::after{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(224,246,243,.9), transparent 70%);
      right:-20px;
      top:-10px;
      pointer-events:none;
    }
    .stat-label{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:12px;
      font-weight:700;
      margin-bottom:18px;
    }
    .stat-foot{
      margin-top:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      color:var(--muted);
      font-size:13px;
    }
    .split{
      display:grid;
      grid-template-columns:minmax(280px,1fr) minmax(420px,1.4fr);
      gap:16px;
      align-items:start;
    }
    .dense-table td,.dense-table th{padding:11px 12px}
    .inline-form{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .count-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:10px;
      background:color-mix(in srgb, var(--primary) 12%, white 88%);
      color:color-mix(in srgb, var(--primary) 72%, #13383c 28%);
      font-weight:700;
      font-variant-numeric:tabular-nums lining-nums;
      font-feature-settings:"tnum" 1,"lnum" 1;
      border:1px solid rgba(11,116,184,.10);
    }
    .surface{
      background:linear-gradient(180deg, #ffffff, #f2fbfa);
      border:1px solid rgba(24,33,43,.08);
      border-radius:10px;
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .surface table th{
      color:#315b5f;
      font-weight:700;
      width:40%;
    }
    .surface table td{
      color:#1f4145;
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:10px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
      border:1px solid transparent;
    }
    .status-pill::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      opacity:.85;
    }
    .status-pill.online{background:rgba(26,163,74,.12);color:#0d7a33;border-color:rgba(26,163,74,.14)}
    .status-pill.offline{background:rgba(94,106,120,.12);color:#5e6a78;border-color:rgba(94,106,120,.14)}
    .status-pill.active{background:rgba(11,116,184,.10);color:#0b74b8;border-color:rgba(11,116,184,.12)}
    .status-pill.bot{background:rgba(194,138,34,.12);color:#9b6b10;border-color:rgba(194,138,34,.18)}
    .status-pill.idle{background:rgba(184,64,53,.10);color:#a73c31;border-color:rgba(184,64,53,.14)}
    .status-pill.mono::before{display:none}
    .empty-state{
      padding:28px 16px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }
    .compact-note{
      color:var(--muted);
      font-size:12px;
    }
    .editor-note{font-size:12px;color:var(--muted)}
    .nav-scrim{
      position:fixed;
      inset:0;
      background:rgba(27,63,68,.10);
      backdrop-filter:blur(2px);
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease;
      z-index:20;
    }
    body.nav-open .nav-scrim{
      opacity:1;
      pointer-events:auto;
    }
    @media (max-width: 900px){
      .wrap{padding:12px}
      nav{
        top:12px;
        left:12px;
        right:12px;
        bottom:12px;
        width:auto;
      }
      .nav-right .lang-row{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        width:100%;
      }
      .page-head h2{font-size:28px}
      .chart{height:220px}
      .split{grid-template-columns:1fr}
      .card{padding:16px}
      .table-shell{border-radius:10px}
      .count-badge{width:100%;justify-content:center}
    }
  </style>
</head>
<body>
  <div class="nav-scrim" id="navScrim"></div>
  <nav>
    <div class="nav-left">
      <strong class="nav-brand"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 4v10l-7 4-7-4V7l7-4Z"/><path d="M9 12h6"/><path d="M12 9v6"/></svg><span data-i18n="nav_admin">Admin</span></strong>
    </div>
    <div class="nav-right" id="navPanel">
      <div class="nav-menu">
        <a href="/admin"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M9 20v-5h6v5"/></svg><span data-i18n="nav_main">Main</span></a>
        <a href="/admin/system"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v4"/><path d="M12 17v4"/><path d="M4.9 4.9l2.8 2.8"/><path d="M16.3 16.3l2.8 2.8"/><path d="M3 12h4"/><path d="M17 12h4"/><path d="M4.9 19.1l2.8-2.8"/><path d="M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="3"/></svg><span data-i18n="nav_system">System</span></a>
        <a href="/admin/users"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 19a4 4 0 0 0-8 0"/><circle cx="12" cy="11" r="3"/><path d="M5 19a3 3 0 0 1 3-3"/><path d="M19 19a3 3 0 0 0-3-3"/></svg><span data-i18n="nav_users">Users</span></a>
        <a href="/admin/users/manage"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16"/><path d="M4 12h10"/><path d="M4 19h8"/><path d="M18 15v6"/><path d="M15 18h6"/></svg><span data-i18n="nav_users_manage">User Data</span></a>
        <a href="/admin/matches"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h12v12H6z"/><path d="M9 9h6v6H9z"/><path d="M6 12H3"/><path d="M21 12h-3"/></svg><span data-i18n="nav_matches">Matches</span></a>
      </div>
      <div class="sp"></div>
      <div class="lang-row">
        <button type="button" onclick="setLang('zh')"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg><span>中文</span></button>
        <button type="button" onclick="setLang('en')"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg><span>EN</span></button>
      </div>
      <a href="#" id="logoutBtn"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 16l4-4-4-4"/><path d="M19 12H9"/><path d="M12 19H5V5h7"/></svg><span data-i18n="nav_logout">Logout</span></a>
    </div>
  </nav>
  <button type="button" id="navFab" class="nav-fab">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
    <span class="nav-fab-label" data-i18n="nav_menu">菜单</span>
  </button>
  <div class="wrap">{{BODY}}</div>
  <script>
    const I18N={
      zh:{
        nav_admin:'管理后台',nav_main:'主面板',nav_system:'系统状态',nav_users:'在线用户',nav_users_manage:'用户管理',nav_matches:'对局状态',nav_logout:'退出',nav_menu:'菜单',
        kpi_online:'在线用户',kpi_matches:'进行中对局',kpi_uptime:'运行时长',kpi_time:'服务器时间',
        sys_title:'系统占用',users_title:'在线用户',users_manage_title:'用户数据管理',matches_title:'对局状态',memory_trend_title:'内存趋势 (MB)',
        btn_save:'保存',btn_delete:'删除',btn_reload:'刷新',
        status_online:'在线',status_offline:'离线',
        col_id:'ID',col_username:'用户名',col_player_name:'玩家名',col_tag:'标签',col_status:'状态',col_gold:'金币',col_diamonds:'钻石',col_season_wins:'赛季胜场',col_online:'在线',col_actions:'操作',col_type:'类型',
        col_turn:'回合',col_action_id:'动作ID',col_left:'左侧玩家',col_right:'右侧玩家',col_left_state:'左侧状态',col_right_state:'右侧状态',col_bot:'机器人',

    };
    let lang=localStorage.getItem('admin_lang')||'zh';
    function tr(k){return (I18N[lang]&&I18N[lang][k])||I18N.en[k]||k;}
    function trf(k, vars){
      let text=tr(k);
      Object.entries(vars||{}).forEach(([name,val])=>{
        text=text.replace(new RegExp('\\{'+name+'\\}','g'), String(val));
      });
      return text;
    }
    function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.dataset.i18n)); if(window.pageRefreshText) window.pageRefreshText();}
    function setLang(next){lang=next;localStorage.setItem('admin_lang',next);applyI18n();}
    function escapeHTML(value){
      return String(value ?? '').replace(/[&<>"']/g, function(ch){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
      });
    }
    function statusPill(text, kind, mono){
      return '<span class="status-pill '+escapeHTML(kind || '')+(mono ? ' mono' : '')+'">'+escapeHTML(text)+'</span>';
    }
    function emptyRow(colspan, text){
      return '<tr><td colspan="'+Number(colspan || 1)+'"><div class="empty-state">'+escapeHTML(text)+'</div></td></tr>';
    }
    function localizeMatchStatus(status){
      const keyMap={running:'match_status_running',finished:'match_status_finished',waiting:'match_status_waiting'};
      return tr(keyMap[String(status||'').toLowerCase()]||'match_status_unknown');
    }
    function localizeConnectionState(status){
      const keyMap={connected:'conn_connected',disconnected:'conn_disconnected'};
      return tr(keyMap[String(status||'').toLowerCase()]||'conn_disconnected');
    }
    window.escapeHTML=escapeHTML;
    window.statusPill=statusPill;
    window.emptyRow=emptyRow;
    window.localizeMatchStatus=localizeMatchStatus;
    window.localizeConnectionState=localizeConnectionState;
    window.tr=tr; window.trf=trf; window.setLang=setLang; applyI18n();
    function markActiveNav(){
      const current=location.pathname.replace(/\/+$/,'')||'/admin';
      document.querySelectorAll('nav a[href]').forEach(a=>{
        const href=(a.getAttribute('href')||'').replace(/\/+$/,'')||'/admin';
        a.classList.toggle('active',href===current);
      });
    }
    markActiveNav();
    const navEl=document.body;
    const navFab=document.getElementById('navFab');
    const navPanel=document.getElementById('navPanel');
    const navScrim=document.getElementById('navScrim');
    let navAnimTimer=0;
    function setNavOpen(next){
      clearTimeout(navAnimTimer);
      if(next){
        navEl.classList.remove('nav-closing');
        navEl.classList.add('nav-opening');
        navEl.classList.add('nav-open');
        navAnimTimer=setTimeout(()=>navEl.classList.remove('nav-opening'), 360);
        return;
      }
      navEl.classList.remove('nav-opening');
      navEl.classList.add('nav-closing');
      navEl.classList.remove('nav-open');
      navAnimTimer=setTimeout(()=>navEl.classList.remove('nav-closing'), 260);
    }
    if(navFab && navPanel){
      navFab.addEventListener('click',()=>setNavOpen(!navEl.classList.contains('nav-open')));
      if(navScrim) navScrim.addEventListener('click',()=>setNavOpen(false));
      navPanel.querySelectorAll('a[href],button').forEach(el=>{
        el.addEventListener('click',()=>setNavOpen(false));
      });
    }
    let motionFrame=0;
    function setInteractiveMotion(clientX, clientY){
      const x=(clientX / window.innerWidth) * 100;
      const y=(clientY / window.innerHeight) * 100;
      document.documentElement.style.setProperty('--mx', x.toFixed(2)+'%');
      document.documentElement.style.setProperty('--my', y.toFixed(2)+'%');
      document.documentElement.style.setProperty('--nav-shift', (50 + (x - 50) * 0.25).toFixed(2)+'%');
      document.documentElement.style.setProperty('--hero-shift', (50 + (x - 50) * 0.30).toFixed(2)+'%');
    }
    window.addEventListener('mousemove',e=>{
      if(motionFrame) return;
      motionFrame=requestAnimationFrame(()=>{
        setInteractiveMotion(e.clientX,e.clientY);
        motionFrame=0;
      });
    });
    setInteractiveMotion(window.innerWidth * 0.54, window.innerHeight * 0.28);
    const defaultTheme={mode:'gradient',primary:'#4ea8a2',secondary:'#7fbfbf',surface:'#ffffff'};
    function loadThemeSettings(){
      try{
        return {...defaultTheme, ...(JSON.parse(localStorage.getItem('admin_theme_settings') || '{}'))};
      }catch(_){
        return {...defaultTheme};
      }
    }
    function applyThemeSettings(settings){
      const theme=settings || loadThemeSettings();
      document.documentElement.style.setProperty('--primary', theme.primary || defaultTheme.primary);
      document.documentElement.style.setProperty('--primary-deep', theme.primary || defaultTheme.primary);
      document.documentElement.style.setProperty('--gold', theme.secondary || defaultTheme.secondary);
      document.documentElement.style.setProperty('--bg-mint', theme.secondary || defaultTheme.secondary);
      document.documentElement.style.setProperty('--panel', theme.surface || defaultTheme.surface);
      document.documentElement.style.setProperty('--surface-opacity', theme.mode === 'solid' ? '.98' : '.94');
      document.body.style.background = '#e8eeed';
      window.dispatchEvent(new CustomEvent('admin-theme-change',{detail:theme}));
    }
    function saveThemeSettings(settings){
      localStorage.setItem('admin_theme_settings', JSON.stringify(settings));
      applyThemeSettings(settings);
    }
    window.loadThemeSettings=loadThemeSettings;
    window.applyThemeSettings=applyThemeSettings;
    window.saveThemeSettings=saveThemeSettings;
    applyThemeSettings(loadThemeSettings());
    function drawLine(canvas, values, style){
      if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const dpr=window.devicePixelRatio || 1;
      const width=canvas.clientWidth;
      const height=canvas.clientHeight;
      canvas.width=width*dpr;
      canvas.height=height*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,width,height);
      if(!values.length) return;
      const opts=typeof style === 'string' ? {stroke:style} : (style || {});
      const stroke=opts.stroke || '#2c5f5f';
      const fill=opts.fill || 'rgba(44,95,95,.10)';
      const grid=opts.grid || 'rgba(44,95,95,.10)';
      const dot=opts.dot || stroke;
      const text=opts.text || '#48696c';
      const max=Math.max(...values,1);
      const min=Math.min(...values,0);
      const range=Math.max(max-min,1);
      const left=8;
      const right=width-10;
      const top=22;
      const bottom=height-22;
      const plotHeight=Math.max(bottom-top,1);
      const plotWidth=Math.max(right-left,1);
      const formatValue=opts.format || function(v){
        return Math.abs(v % 1) > 0.001 ? v.toFixed(1) : String(Math.round(v));
      };
      ctx.strokeStyle=grid;
      ctx.lineWidth=1;
      for(let i=0;i<4;i++){
        const y=top + (plotHeight/3)*i;
        ctx.beginPath();
        ctx.moveTo(left,y);
        ctx.lineTo(right,y);
        ctx.stroke();
      }
      const points=values.map((v,i)=>{
        const x=left + (plotWidth/(Math.max(values.length-1,1)))*i;
        const y=bottom - ((v-min)/range)*plotHeight;
        return {x,y};
      });
      ctx.beginPath();
      points.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
      });
      ctx.lineTo(right,bottom);
      ctx.lineTo(left,bottom);
      ctx.closePath();
      ctx.fillStyle=fill;
      ctx.fill();
      ctx.beginPath();
      points.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
      });
      ctx.strokeStyle=stroke;
      ctx.lineWidth=2.4;
      ctx.lineJoin='round';
      ctx.lineCap='round';
      ctx.stroke();
      const last=points[points.length-1];
      if(last){
        ctx.fillStyle='#ffffff';
        ctx.beginPath();
        ctx.arc(last.x,last.y,4.5,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle=dot;
        ctx.lineWidth=2.4;
        ctx.beginPath();
        ctx.arc(last.x,last.y,3.2,0,Math.PI*2);
        ctx.stroke();
        const currentLabel=formatValue(values[values.length-1]);
        ctx.font='12px Aptos, Trebuchet MS, Segoe UI, sans-serif';
        ctx.textBaseline='middle';
        const currentWidth=ctx.measureText(currentLabel).width + 14;
        const labelX=Math.min(Math.max(last.x + 10, left), right - currentWidth);
        const labelY=Math.max(top + 10, Math.min(last.y, bottom - 10));
        ctx.fillStyle='rgba(255,255,255,.95)';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(labelX, labelY - 11, currentWidth, 22, 8);
        else ctx.rect(labelX, labelY - 11, currentWidth, 22);
        ctx.fill();
        ctx.strokeStyle='rgba(44,95,95,.14)';
        ctx.lineWidth=1;
        ctx.stroke();
        ctx.fillStyle=text;
        ctx.fillText(currentLabel, labelX + 7, labelY);
      }
      ctx.save();
      ctx.fillStyle=text;
      ctx.font='11px Aptos, Trebuchet MS, Segoe UI, sans-serif';
      ctx.textBaseline='top';
      const maxLabel='MAX ' + formatValue(max);
      const minLabel='MIN ' + formatValue(min);
      ctx.fillText(maxLabel, left, 2);
      const minMetrics=ctx.measureText(minLabel);
      ctx.fillText(minLabel, right - minMetrics.width, height - 14);
      ctx.restore();
    }
    window.drawLine=drawLine;
    document.getElementById('logoutBtn').onclick=async(e)=>{e.preventDefault();await fetch('/admin/api/logout',{method:'POST'});location.href='/admin/login';};
  </script>
